<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AnaFood - Plataforma de Delivery</title>

    <!-- Resource hints for faster loading -->
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />

    <!-- Preload critical CSS -->
    <link rel="preload" as="style" href="/src/index.css" />

    <!-- Anti-FOUC dark mode: aplica classe ANTES de React montar -->
    <!-- Lê 'anafood-last-theme' (último tema usado nesta máquina, qualquer usuário) -->
    <!-- Sem flash quando voltar à página -->
    <script>
      (function() {
        try {
          var t = localStorage.getItem('anafood-last-theme');
          if (t === 'dark') document.documentElement.classList.add('dark');
        } catch (e) {}
      })();
    </script>

    <!-- Critical inline styles to prevent FOUC -->
    <style>
      body { margin: 0; font-family: system-ui, -apple-system, sans-serif; }
      #root { min-height: 100vh; }
      .loader { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
      /* Background base alinhado com tema — evita branco antes do CSS principal carregar */
      html.dark, html.dark body { background-color: #0a0a0a; color: #fafafa; }
    </style>
    <meta name="description" content="Crie sua loja de delivery online em minutos. Plataforma completa para gerenciar pedidos, produtos e clientes.">
    <meta name="author" content="AnaFood" />
    <meta name="theme-color" content="#f97316" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />

    
    
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://storage.googleapis.com/gpt-engineer-file-uploads/cUgt9w3Qd9OBBmNBP9SeNahZUbk1/uploads/1762310718476-Anafood-delivery.png" />
